<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white-bg: #F5F0E8;
    --black-bg: #1A1A1A;
    --black-text: #E8E0CC;
    --accent: #C8993C;
    --accent-light: #E8B84B;
    --danger: #C0392B;
    --green: #27AE60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #setup {
    width: 100%;
    max-width: 420px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--accent);
    text-align: center;
    letter-spacing: 4px;
    line-height: 1;
  }

  .setup-title span { color: #fff; }
  .chess-icon { text-align: center; font-size: 48px; margin-bottom: -8px; }

  .player-setup {
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .player-setup-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
  }

  .player-name-input {
    background: #2A2A2A;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .player-name-input:focus { border-color: var(--accent); }

  .piece-selector { display: flex; gap: 8px; }

  .piece-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid #333;
    background: transparent;
    cursor: pointer;
    font-size: 24px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    color: #999;
  }

  .piece-btn.selected-white { border-color: #fff; background: rgba(255,255,255,0.1); color: #fff; }
  .piece-btn.selected-black { border-color: var(--accent); background: rgba(200,153,60,0.15); color: var(--accent); }

  .time-section {
    background: #1E1E1E;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 20px;
  }

  .time-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 14px;
  }

  .time-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  .time-opt {
    padding: 10px 4px;
    background: #2A2A2A;
    border: 2px solid #333;
    border-radius: 10px;
    color: #999;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }

  .time-opt:hover { border-color: #555; color: #ccc; }
  .time-opt.active { border-color: var(--accent); color: var(--accent); background: rgba(200,153,60,0.1); }

  .custom-time { display: flex; align-items: center; gap: 10px; }

  .custom-time input {
    flex: 1;
    background: #2A2A2A;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 10px 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .custom-time input:focus { border-color: var(--accent); }
  .custom-time label { color: #666; font-size: 13px; white-space: nowrap; }

  .start-btn {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-size: 20px;
    font-weight: 800;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }

  .start-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }

  /* GAME SCREEN */
  #game {
    display: none;
    width: 100%;
    height: 100vh;
    flex-direction: column;
  }

  .player-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.2s, opacity 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .player-panel.top { background: var(--black-bg); }
  .player-panel.top .panel-content { transform: rotate(180deg); }
  .player-panel.bottom { background: var(--white-bg); }
  .player-panel.active.top { background: #0F0F0F; }
  .player-panel.active.bottom { background: #EDE5CC; }
  .player-panel.inactive { opacity: 0.45; filter: grayscale(20%); }

  .panel-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 16px;
    width: 100%;
  }

  .player-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .top .player-label { color: #555; }
  .bottom .player-label { color: #888; }
  .active.top .player-label { color: var(--accent); }
  .active.bottom .player-label { color: #777; }

  .player-name-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
  }

  .top .player-name-display { color: var(--black-text); }
  .bottom .player-name-display { color: #2A1A00; }

  .piece-display { font-size: 28px; line-height: 1; }

  /* Timer display with tenths */
  .timer-wrap {
    display: flex;
    align-items: baseline;
    font-family: 'Bebas Neue', sans-serif;
    line-height: 1;
    transition: color 0.3s;
  }

  .t-main {
    font-size: clamp(68px, 19vw, 116px);
    letter-spacing: 2px;
  }

  .t-dot {
    font-size: clamp(44px, 12vw, 76px);
    opacity: 0.55;
    margin: 0 1px 0 2px;
    letter-spacing: 0;
  }

  .t-tenth {
    font-size: clamp(44px, 12vw, 76px);
    letter-spacing: 0;
    min-width: 0.6em;
    text-align: left;
  }

  .top .timer-wrap { color: #FFFFFF; }
  .bottom .timer-wrap { color: #1A0A00; }

  .timer-wrap.danger { animation: timerPulse 0.35s ease-in-out infinite; }
  .timer-wrap.danger .t-main,
  .timer-wrap.danger .t-dot,
  .timer-wrap.danger .t-tenth { color: var(--danger) !important; }

  @keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  .tap-hint {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .top .tap-hint { color: var(--accent); }
  .bottom .tap-hint { color: #888; }
  .active .tap-hint { opacity: 1; }

  /* Divider */
  .divider {
    height: 60px;
    background: #0A0A0A;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-shrink: 0;
    z-index: 10;
    border-top: 1px solid #1A1A1A;
    border-bottom: 1px solid #1A1A1A;
  }

  .control-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-back { background: #252525; color: #888; }
  .btn-back:hover { background: #333; color: #fff; }

  .btn-reset { background: #252525; color: #888; }
  .btn-reset:hover { background: #C0392B; color: #fff; }

  .btn-pause { background: #252525; color: #888; }
  .btn-pause:hover { background: #333; color: #fff; }
  .btn-pause.paused { background: var(--green); color: #fff; }

  .turn-indicator {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 3px;
    color: #444;
    min-width: 64px;
    text-align: center;
  }

  .turn-indicator.running { color: var(--accent); }

  /* Game over */
  #gameover {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 32px;
  }

  .gameover-icon { font-size: 72px; }

  .gameover-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--danger);
    text-align: center;
  }

  .gameover-sub {
    font-size: 18px;
    color: #999;
    text-align: center;
    line-height: 1.6;
  }

  .gameover-sub strong { color: #fff; }
  .gameover-actions { display: flex; gap: 12px; margin-top: 8px; }

  .btn-secondary {
    padding: 14px 24px;
    background: #2A2A2A;
    color: #ccc;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .btn-secondary:hover { background: #3A3A3A; }

  .btn-primary {
    padding: 14px 24px;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .btn-primary:hover { background: var(--accent-light); }

  @keyframes activateFlash {
    0% { opacity: 1; }
    40% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  .player-panel.just-switched { animation: activateFlash 0.18s ease-out; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="chess-icon">♟</div>
  <div class="setup-title"><span>Chess</span> Timer</div>

  <div class="player-setup">
    <div class="player-setup-title">Pemain 1</div>
    <input class="player-name-input" id="p1name" type="text" placeholder="Nama Pemain 1" maxlength="16" value="Pemain 1">
    <div class="piece-selector">
      <button class="piece-btn selected-white" id="p1white" onclick="selectPiece(1,'white')">♔ Putih</button>
      <button class="piece-btn" id="p1black" onclick="selectPiece(1,'black')">♚ Hitam</button>
    </div>
  </div>

  <div class="player-setup">
    <div class="player-setup-title">Pemain 2</div>
    <input class="player-name-input" id="p2name" type="text" placeholder="Nama Pemain 2" maxlength="16" value="Pemain 2">
    <div class="piece-selector">
      <button class="piece-btn" id="p2white" onclick="selectPiece(2,'white')">♔ Putih</button>
      <button class="piece-btn selected-black" id="p2black" onclick="selectPiece(2,'black')">♚ Hitam</button>
    </div>
  </div>

  <div class="time-section">
    <div class="time-label">Waktu per Pemain</div>
    <div class="time-options">
      <div class="time-opt" onclick="setTime(1,this)">1 min</div>
      <div class="time-opt active" onclick="setTime(5,this)">5 min</div>
      <div class="time-opt" onclick="setTime(10,this)">10 min</div>
      <div class="time-opt" onclick="setTime(15,this)">15 min</div>
      <div class="time-opt" onclick="setTime(20,this)">20 min</div>
      <div class="time-opt" onclick="setTime(30,this)">30 min</div>
      <div class="time-opt" onclick="setTime(45,this)">45 min</div>
      <div class="time-opt" onclick="setTime(60,this)">60 min</div>
    </div>
    <div class="custom-time">
      <input type="number" id="customTime" min="1" max="180" placeholder="Custom" oninput="setCustomTime(this.value)">
      <label>menit (custom)</label>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">MULAI PERMAINAN</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="player-panel top inactive" id="panel2" onclick="switchTurn(2)">
    <div class="panel-content">
      <div class="tap-hint">KETUK UNTUK PINDAH GILIRAN</div>
      <div class="timer-wrap" id="tw2">
        <span class="t-main" id="tm2">05:00</span><span class="t-dot">.</span><span class="t-tenth" id="tt2">0</span>
      </div>
      <div class="piece-display" id="piece2">♚</div>
      <div class="player-name-display" id="name2">Pemain 2</div>
      <div class="player-label">GILIRAN ANDA</div>
    </div>
  </div>

  <div class="divider">
    <button class="control-btn btn-back" onclick="backToSetup()" title="Menu">⚙</button>
    <button class="control-btn btn-reset" onclick="resetGame()" title="Reset">↺</button>
    <div class="turn-indicator" id="turnInd">SIAP</div>
    <button class="control-btn btn-pause" id="pauseBtn" onclick="togglePause()" title="Pause">⏸</button>
  </div>

  <div class="player-panel bottom active" id="panel1" onclick="switchTurn(1)">
    <div class="panel-content">
      <div class="player-label">GILIRAN ANDA</div>
      <div class="player-name-display" id="name1">Pemain 1</div>
      <div class="piece-display" id="piece1">♔</div>
      <div class="timer-wrap" id="tw1">
        <span class="t-main" id="tm1">05:00</span><span class="t-dot">.</span><span class="t-tenth" id="tt1">0</span>
      </div>
      <div class="tap-hint">KETUK UNTUK PINDAH GILIRAN</div>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="gameover-icon">⏱</div>
  <div class="gameover-title" id="goTitle">WAKTU HABIS!</div>
  <div class="gameover-sub" id="goSub"></div>
  <div class="gameover-actions">
    <button class="btn-secondary" onclick="backToSetup()">Ubah Pengaturan</button>
    <button class="btn-primary" onclick="restartSame()">Main Lagi</button>
  </div>
</div>

<script>
  let selectedTime = 5;
  let p1Color = 'white', p2Color = 'black';

  // Time stored in tenths of a second
  let p1Time, p2Time;
  let currentTurn = 1;
  let gameStarted = false, gameRunning = false, paused = false;
  let rafId = null, lastTs = null, acc = 0;

  function selectPiece(player, color) {
    if (player === 1) { p1Color = color; p2Color = color === 'white' ? 'black' : 'white'; }
    else { p2Color = color; p1Color = color === 'white' ? 'black' : 'white'; }
    updatePieceBtns();
  }

  function updatePieceBtns() {
    document.getElementById('p1white').className = 'piece-btn' + (p1Color === 'white' ? ' selected-white' : '');
    document.getElementById('p1black').className = 'piece-btn' + (p1Color === 'black' ? ' selected-black' : '');
    document.getElementById('p2white').className = 'piece-btn' + (p2Color === 'white' ? ' selected-white' : '');
    document.getElementById('p2black').className = 'piece-btn' + (p2Color === 'black' ? ' selected-black' : '');
  }

  function setTime(min, el) {
    selectedTime = min;
    document.querySelectorAll('.time-opt').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('customTime').value = '';
  }

  function setCustomTime(val) {
    if (val && +val > 0) {
      selectedTime = parseInt(val);
      document.querySelectorAll('.time-opt').forEach(e => e.classList.remove('active'));
    }
  }

  function renderTimer(p, tenths) {
    const tot = Math.max(0, tenths);
    const totalSec = Math.floor(tot / 10);
    const tenth = tot % 10;
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    const main = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

    document.getElementById('tm' + p).textContent = main;
    document.getElementById('tt' + p).textContent = tenth;

    const tw = document.getElementById('tw' + p);
    if (tot <= 100) tw.classList.add('danger');
    else tw.classList.remove('danger');
  }

  function startGame() {
    const n1 = document.getElementById('p1name').value.trim() || 'Pemain 1';
    const n2 = document.getElementById('p2name').value.trim() || 'Pemain 2';

    p1Time = selectedTime * 600;
    p2Time = selectedTime * 600;

    document.getElementById('name1').textContent = n1;
    document.getElementById('name2').textContent = n2;
    document.getElementById('piece1').textContent = p1Color === 'white' ? '♔' : '♚';
    document.getElementById('piece2').textContent = p2Color === 'white' ? '♔' : '♚';

    renderTimer(1, p1Time);
    renderTimer(2, p2Time);

    currentTurn = p1Color === 'white' ? 1 : 2;
    gameStarted = false; gameRunning = false; paused = false;
    lastTs = null; acc = 0;

    setPanels();
    setIndicator('SIAP');
    document.getElementById('pauseBtn').className = 'control-btn btn-pause';
    document.getElementById('pauseBtn').textContent = '⏸';

    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    document.getElementById('gameover').style.display = 'none';
  }

  function setPanels() {
    const p1 = document.getElementById('panel1');
    const p2 = document.getElementById('panel2');
    p1.className = 'player-panel bottom ' + (currentTurn === 1 ? 'active' : 'inactive');
    p2.className = 'player-panel top '    + (currentTurn === 2 ? 'active' : 'inactive');
  }

  function setIndicator(text) {
    const el = document.getElementById('turnInd');
    el.textContent = text;
    el.className = 'turn-indicator' + (gameRunning && !paused ? ' running' : '');
  }

  function switchTurn(fromPlayer) {
    if (paused) return;
    if (gameRunning && fromPlayer !== currentTurn) return;

    if (!gameStarted) {
      gameStarted = true; gameRunning = true;
      lastTs = null; acc = 0;
      rafId = requestAnimationFrame(tick);
      setPanels();
      setIndicator('JALAN');
      return;
    }

    currentTurn = currentTurn === 1 ? 2 : 1;
    const np = document.getElementById('panel' + currentTurn);
    np.classList.add('just-switched');
    setTimeout(() => np.classList.remove('just-switched'), 200);
    setPanels();
    setIndicator('JALAN');
  }

  function tick(ts) {
    if (!gameRunning || paused) { lastTs = null; return; }

    if (lastTs !== null) {
      acc += ts - lastTs;
      while (acc >= 100) {
        acc -= 100;
        if (currentTurn === 1) {
          p1Time--;
          renderTimer(1, p1Time);
          if (p1Time <= 0) { endGame(1); return; }
        } else {
          p2Time--;
          renderTimer(2, p2Time);
          if (p2Time <= 0) { endGame(2); return; }
        }
      }
    }

    lastTs = ts;
    rafId = requestAnimationFrame(tick);
  }

  function togglePause() {
    if (!gameStarted) return;
    paused = !paused;
    const btn = document.getElementById('pauseBtn');
    if (paused) {
      btn.className = 'control-btn btn-pause paused';
      btn.textContent = '▶';
      setIndicator('PAUSE');
      lastTs = null; acc = 0;
    } else {
      btn.className = 'control-btn btn-pause';
      btn.textContent = '⏸';
      setIndicator('JALAN');
      lastTs = null; acc = 0;
      rafId = requestAnimationFrame(tick);
    }
  }

  function endGame(loser) {
    gameRunning = false;
    cancelAnimationFrame(rafId);
    const ln = document.getElementById('name' + loser).textContent;
    const wn = document.getElementById('name' + (loser === 1 ? 2 : 1)).textContent;
    document.getElementById('goTitle').textContent = 'WAKTU HABIS!';
    document.getElementById('goSub').innerHTML = `Waktu <strong>${ln}</strong> habis.<br><strong>${wn}</strong> menang! 🏆`;
    document.getElementById('gameover').style.display = 'flex';
  }

  function resetGame() {
    cancelAnimationFrame(rafId);
    gameRunning = false; gameStarted = false; paused = false;
    lastTs = null; acc = 0;

    p1Time = selectedTime * 600;
    p2Time = selectedTime * 600;
    currentTurn = p1Color === 'white' ? 1 : 2;

    renderTimer(1, p1Time);
    renderTimer(2, p2Time);
    document.getElementById('pauseBtn').className = 'control-btn btn-pause';
    document.getElementById('pauseBtn').textContent = '⏸';
    document.getElementById('gameover').style.display = 'none';
    setPanels();
    setIndicator('SIAP');
  }

  function restartSame() {
    document.getElementById('gameover').style.display = 'none';
    resetGame();
  }

  function backToSetup() {
    cancelAnimationFrame(rafId);
    gameRunning = false; gameStarted = false; paused = false; acc = 0;
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('game').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (document.getElementById('game').style.display === 'flex') {
        if (paused) { togglePause(); return; }
        switchTurn(currentTurn);
      }
    }
    if (e.code === 'Escape') togglePause();
  });
</script>
</body>
</html>
